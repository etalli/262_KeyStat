name: AI repo review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai

      - name: Run AI review
        run: |
          python scripts/ai_review.py > issues.txt

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "AI suggestion $(date +%F)" \
            --body-file issues.txt