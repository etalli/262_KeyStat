name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Verify selected developer directory
        run: |
          echo "DEVELOPER_DIR=${DEVELOPER_DIR:-<not set>}"
          xcode-select -p
          xcrun --find swift
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: |
          export DEVELOPER_DIR="$(xcode-select -p)"
          swift test
